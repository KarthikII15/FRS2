version: '3.8'

services:
  # ====== POSTGRESQL (Main Database) ======
  postgres:
    image: pgvector/pgvector:pg16
    container_name: attendance-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # CHANGE THIS - see PASSWORDS.txt
      POSTGRES_DB: attendance_intelligence
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"  # ✅ FIXED: Localhost only
    networks:
      - frs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ====== ZOOKEEPER (Kafka Dependency) ======
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: attendance-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"  # ✅ FIXED: Localhost only
    networks:
      - frs-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ====== KAFKA (Message Queue - Optional) ======
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: attendance-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"  # ✅ FIXED: Memory limit
    ports:
      - "127.0.0.1:9092:9092"  # ✅ FIXED: Localhost only
      - "127.0.0.1:9093:9093"  # ✅ FIXED: Localhost only
    networks:
      - frs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ====== KEYCLOAK POSTGRES ======
  keycloak-postgres:
    image: postgres:16
    container_name: keycloak-postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}  # CHANGE THIS - see PASSWORDS.txt
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"  # ✅ FIXED: Localhost only, different port
    networks:
      - frs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ====== KEYCLOAK (Authentication) ======
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: attendance-keycloak
    depends_on:
      - keycloak-postgres
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}  # CHANGE THIS - see PASSWORDS.txt
      KC_HOSTNAME: 172.20.100.222
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}  # CHANGE THIS - see PASSWORDS.txt
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      JAVA_OPTS: "-Xms256m -Xmx512m"  # ✅ FIXED: Memory limit
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "9090:8080"  # External access needed for auth
    networks:
      - frs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ====== BACKEND (Node.js API) ======
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance-backend
    depends_on:
      - postgres
      - keycloak
    environment:
      NODE_ENV: production
      PORT: 8080
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
      - /opt/frs/photos:/app/photos  # Mount for proof photos
    ports:
      - "8080:8080"  # External access needed for API
    networks:
      - frs-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ====== FRONTEND (React) ======
  # ⚠️ WARNING: Still using dev server - needs production build (see Phase 7)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attendance-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://172.20.100.222:8080
      VITE_KEYCLOAK_URL: http://172.20.100.222:9090
      VITE_KEYCLOAK_REALM: attendance
      VITE_KEYCLOAK_CLIENT_ID: attendance-frontend
    ports:
      - "5173:5173"  # External access needed for UI
    networks:
      - frs-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ====== NETWORKS ======
networks:
  frs-network:
    driver: bridge

# ====== VOLUMES ======
volumes:
  postgres_data:
    driver: local
  keycloak_postgres_data:
    driver: local
