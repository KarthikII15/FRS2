# Prometheus Configuration for FRS2 Attendance System
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'frs2-production'
    environment: 'production'

# Alertmanager configuration (optional - can add later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'system'
          instance: 'vm-backend'

  # PostgreSQL Exporter - Database metrics
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'database'
          database: 'attendance_intelligence'

  # Backend API - Custom metrics (we'll create this endpoint next)
  - job_name: 'frs-backend'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'api'
          component: 'backend'
    metrics_path: '/metrics'

  # Jetson Orin NX - Edge device metrics (we'll configure this in Task 4.3)
  - job_name: 'jetson-devices'
    static_configs:
      - targets: ['172.18.3.202:9091']
        labels:
          service: 'edge'
          device_type: 'jetson_orin_nx'
          device_code: 'jetson-orin-01'
          location: 'motivity_hq'
