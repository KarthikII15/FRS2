services:
  postgres:
    image: ankane/pgvector:latest
    container_name: attendance-postgres
    environment:
      POSTGRES_DB: attendance_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
    - 127.0.0.1:5432:5432
    volumes:
    - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d attendance_intelligence
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
    - attendance-network
    restart: unless-stopped
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: attendance-kafka
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: '1'
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://172.20.100.222:9093
      KAFKA_HEAP_OPTS: -Xmx512m -Xms256m
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNjJENDM2Qk
      CLUSTER_ID: MkU3OEVBNTcwNjJENDM2Qk
    ports:
    - 127.0.0.1:9092:9092
    - 127.0.0.1:9093:9093
    healthcheck:
      test:
      - CMD-SHELL
      - kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit
        1
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
    - attendance-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
  keycloak-db:
    image: postgres:15-alpine
    container_name: attendance-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak123
    volumes:
    - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U keycloak -d keycloak
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
    - attendance-network
    restart: unless-stopped
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: attendance-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak123
      KC_HOSTNAME: 172.20.100.222
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_STRICT_HTTPS: 'false'
      KC_HTTP_ENABLED: 'true'
    ports:
    - 9090:8080
    volumes:
    - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    - keycloak-data:/opt/keycloak/data
    - ./keycloak/themes/frs2:/opt/keycloak/themes/frs2:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
    - attendance-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance-backend
    env_file:
    - ./backend/.env
    environment:
      DB_HOST: postgres
      KAFKA_BROKERS: kafka:9092
    ports:
    - 8080:8080
    volumes:
    - backend-data:/app/data
    - backend-temp:/app/temp
    - /opt/frs/photos:/opt/frs/photos
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
        required: false
    networks:
    - attendance-network
    restart: unless-stopped
    command: >
      sh -c "
        echo '✅ Environment validated' &&
        node scripts/create-topics.js &&
        echo '✅ Topics created' &&
        node scripts/migrate.js &&
        echo '✅ Migrations complete - Seed skipped (data exists)' &&
        node src/server.js
      "
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: attendance-frontend
    env_file:
    - ./.env
    ports:
    - 5173:5173
    depends_on:
    - backend
    networks:
    - attendance-network
    restart: unless-stopped
networks:
  attendance-network:
    driver: bridge
volumes:
  postgres-data: null
  backend-data: null
  backend-temp: null
  keycloak-data: null
  keycloak-db-data: null
